name: Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn joblib matplotlib seaborn pytest
      - name: Run integration
        run: python 01_data_integration.py
      - name: Run tests
        run: pytest tests/ -v --tb=short
